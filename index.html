<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordsPlay — Mesa de Casino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ FONDO DE MESA — imagen de lujo ░░ -->
  <div class="bg-scene" id="bgScene" aria-hidden="true">
    <div class="bg-layer bg-layer--image"></div>
    <div class="bg-layer bg-layer--spotlight"></div>
    <div class="bg-layer bg-layer--inner-depth"></div>
    <div class="bg-layer bg-layer--vignette"></div>
  </div>

  <main class="shell">
    <header class="hero">
      <div class="brand-mark" aria-hidden="true">
        <span class="brand-mark__suit">♠</span>
        <span class="brand-mark__suit brand-mark__suit--red">♦</span>
        <span class="brand-mark__suit">♣</span>
        <span class="brand-mark__suit brand-mark__suit--red">♥</span>
      </div>
      <h1 class="title">WordsPlay</h1>
      <p class="subtitle">Palabras al azar, sin repetir en cada mano — estilo casino.</p>
    </header>

    <section class="panel glass" aria-label="Controles">
      <div class="field">
        <label class="field__label" for="count">Cartas en la mano</label>
        <div class="field__row">
          <input type="range" id="count" class="slider"
            min="1" max="5" value="3"
            aria-valuemin="1" aria-valuemax="5" aria-valuenow="3" />
          <output class="slider-value" id="countOut" for="count">3</output>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn btn--primary" id="btnGenerate">Repartir mano</button>
        <button type="button" class="btn btn--ghost"   id="btnShuffle">&#x21BA;&nbsp;Barajar</button>
      </div>
    </section>

    <section class="deck" aria-live="polite" aria-atomic="true">
      <div id="tableArea" class="table-area"></div>
      <p id="emptyState" class="empty">
        Elige cuántas cartas quieres y pulsa <strong>Repartir mano</strong>.
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
